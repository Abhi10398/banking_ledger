databaseChangeLog:
  - changeSet:
      id: 004_create_audit_log
      author: abhinav
      changes:
        - sql:
            sql: |
              CREATE TYPE audit_operation AS ENUM (
                  'TRANSFER', 'REVERSAL', 'DEPOSIT', 'WITHDRAWAL'
              );
              CREATE TYPE audit_outcome AS ENUM ('SUCCESS', 'FAILURE');

              CREATE TABLE audit_log (
                  id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                  operation       audit_operation NOT NULL,
                  from_account_id UUID,
                  to_account_id   UUID,
                  amount          BIGINT NOT NULL,
                  outcome         audit_outcome NOT NULL,
                  failure_reason  TEXT,
                  transfer_id     UUID,
                  created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
                  updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()
              );

              CREATE INDEX idx_audit_created  ON audit_log(created_at DESC);
              CREATE INDEX idx_audit_accounts ON audit_log(from_account_id, to_account_id);
