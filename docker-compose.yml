version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: banking_ledger
      POSTGRES_USER: ledger_user
      POSTGRES_PASSWORD: ledger_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_user -d banking_ledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: liquibase/liquibase:4.27
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/postgres/changelog:/liquibase/changelog
    command: >
      --url=jdbc:postgresql://postgres:5432/banking_ledger
      --username=ledger_user
      --password=ledger_pass
      --changeLogFile=changelog/db.changelog-master.yaml
      update

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://ledger_user:ledger_pass@postgres:5432/banking_ledger?sslmode=disable
      PORT: 8080
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
